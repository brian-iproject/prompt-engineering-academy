      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);

          window.history.replaceState(null, null,
            window.location.pathname.replace(/\/$/, '') + decodeURIComponent(p[1]).replace(/~and~/g, '&')
          );
        }
      })();
