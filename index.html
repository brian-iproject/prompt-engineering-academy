<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Engineering Academy</title>
    <script>
      // Restore path after GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            window.location.pathname + decodeURIComponent(p[1]).replace(/~and~/g, '&')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
