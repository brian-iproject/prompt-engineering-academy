<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt Engineering Academy</title>
  <script>
    // SPA redirect: store the path and redirect to index
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') +
      '/?p=' + encodeURIComponent(l.pathname.slice(l.pathname.indexOf('/', 1)) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body></body>
</html>
